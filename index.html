<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda para perros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🐶 Tienda de comida para perros</h1>

    <div class="container">
        <div class="producto">
            <h2>Pienso Premium</h2>
            <p>15€</p>
            <button onclick="agregarAlCarrito('Pienso Premium', 15)">Añadir</button>
        </div>

        <div class="producto">
            <h2>Snack</h2>
            <p>5€</p>
            <button onclick="agregarAlCarrito('Snack', 5)">Añadir</button>
        </div>
    </div>

    <div class="carrito">
        <h2>🛒 Carrito</h2>

        <ul id="carritoLista"></ul>

        <p>Total: <span id="total">0</span> €</p>

        <h3>📍 Datos del cliente</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="direccion" placeholder="Dirección">

        <br><br>

        <button onclick="vaciarCarrito()">Vaciar</button>
        <button onclick="finalizarPedido()">Finalizar pedido</button>
    </div>

    <!-- 🔥 ESTE ES EL IMPORTANTE -->
    <script src="script.js"></script>

</body>
</html>
